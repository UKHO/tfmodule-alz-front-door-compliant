name: $(Build.BuildId)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - modules/**
      - scripts/**
      - examples/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - modules/**
      - scripts/**
      - examples/**

resources:
  containers:
    - container: TerraformContainer
      image: ukhydrographicoffice/terraform-test-toolset:latest

stages:

# ─── Stage 1: Validate ────────────────────────────────────────────────────────

  - stage: Validate
    displayName: "Stage 1: Validate"
    jobs:

      # ── Static analysis: fmt, lint, validate, docs ──

      - job: StaticChecks
        displayName: "Static Checks (fmt, lint, validate, docs)"
        pool:
          vmImage: ubuntu-latest
        container: TerraformContainer
        steps:
          - checkout: self

          - pwsh: scripts/Invoke-TfFmt.ps1 -TerraformDir modules/
            displayName: "terraform fmt check"

          - pwsh: scripts/Invoke-TfLint.ps1 -TerraformDir modules/
            displayName: "TFLint"

          - pwsh: scripts/Invoke-TfValidate.ps1 -ModulesDir modules/
            displayName: "terraform validate"

          - pwsh: scripts/Invoke-TfDocs.ps1 -ModulesDir modules/
            displayName: "terraform-docs check"

      # ── Snyk IaC scan: front-door-platform ──

      - job: SnykScanPlatform
        displayName: "Snyk IaC Scan (front-door-platform)"
        dependsOn: []
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UkhoSnykScanTask@0
            displayName: "Snyk IaC scan — front-door-platform"
            inputs:
              failOnIssues: true
              organization: "f8cb0532-afc8-444d-b6cf-97c0cb941e10"
              serviceConnectionEndpoint: "Snyk Auth"
              testType: iac
              monitorWhen: never
              severityThreshold: high
              targetFile: modules/front-door-platform

      # ── Snyk IaC scan: front-door-delivery ──

      - job: SnykScanDelivery
        displayName: "Snyk IaC Scan (front-door-delivery)"
        dependsOn: []
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UkhoSnykScanTask@0
            displayName: "Snyk IaC scan — front-door-delivery"
            inputs:
              failOnIssues: true
              organization: "f8cb0532-afc8-444d-b6cf-97c0cb941e10"
              serviceConnectionEndpoint: "Snyk Auth"
              testType: iac
              monitorWhen: never
              severityThreshold: high
              targetFile: modules/front-door-delivery

# ─── Stage 2: Tag Release ─────────────────────────────────────────────────────

  - stage: TagRelease
    displayName: "Stage 2: Tag Release"
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: CreateTag
        displayName: "Create semantic version git tag"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - pwsh: |
              $tag = "v$(Build.BuildId)"
              git config user.email "build@azure-devops"
              git config user.name  "Azure DevOps"
              git tag $tag
              git push origin $tag
              Write-Host "Tagged release: $tag"
            displayName: "Tag v$(Build.BuildId)"
